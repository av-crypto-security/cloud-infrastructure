<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Static website hosted on S3-compatible object storage">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="no-referrer">
    <title>Nimbus Static Platform</title>

    <style>
        :root {
            --primary: #111827;
            --accent: #2563eb;
            --bg: #f9fafb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            margin-bottom: 0.75rem;
            line-height: 1.5;
            color: #374151;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            background: var(--accent);
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 20px;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #6b7280;
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>Nimbus Static Platform</h1>
        <p>This website is hosted on S3-compatible object storage.</p>
        <p>No servers. No runtime. Fully static delivery model.</p>

        <div class="badge">
            Serverless • Highly Available • Cost Efficient
        </div>

        <footer>
            Static Hosting Demonstration
        </footer>
    </main>
</body>
</html>
